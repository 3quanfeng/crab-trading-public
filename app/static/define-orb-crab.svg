<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Crab core orb">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7db2ff" stop-opacity="0.26" />
      <stop offset="48%" stop-color="#5d8fdf" stop-opacity="0.14" />
      <stop offset="76%" stop-color="#2f4f8a" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#0b1528" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glass" cx="45%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d8e7ff" stop-opacity="0.28" />
      <stop offset="45%" stop-color="#9fbbe6" stop-opacity="0.13" />
      <stop offset="100%" stop-color="#243a66" stop-opacity="0.08" />
    </radialGradient>
    <filter id="ringGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="lineGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="crabGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(512 512)">
    <circle r="468" fill="url(#halo)" />

    <circle r="298" fill="url(#glass)" stroke="rgba(185,219,255,0.68)" stroke-width="2.4" filter="url(#ringGlow)" />
    <circle r="254" fill="rgba(147,185,236,0.09)" stroke="rgba(183,214,255,0.38)" stroke-width="1.8" />

    <ellipse rx="444" ry="128" fill="none" stroke="rgba(197,223,255,0.68)" stroke-width="2" filter="url(#lineGlow)" />
    <ellipse rx="128" ry="444" fill="none" stroke="rgba(197,223,255,0.66)" stroke-width="2" filter="url(#lineGlow)" />
    <g transform="rotate(20)">
      <ellipse rx="356" ry="104" fill="none" stroke="rgba(170,204,255,0.42)" stroke-width="1.8" />
    </g>

    <g transform="translate(-18 4) scale(2.34)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#crabGlow)">
      <g stroke="#d9ebff" stroke-width="7.4">
        <ellipse cx="128" cy="140" rx="56" ry="40" />
        <g transform="translate(0 2)">
          <path d="M74 126c-17-12-25-30-23-47 2-19 13-34 33-43-7 14-8 28-5 39 13-9 22-14 27-11 4 4 0 15-6 24" />
          <path d="M92 117c16-8 30-12 46-13" />
        </g>
        <g transform="translate(256 2) scale(-1 1)">
          <path d="M74 126c-17-12-25-30-23-47 2-19 13-34 33-43-7 14-8 28-5 39 13-9 22-14 27-11 4 4 0 15-6 24" />
          <path d="M92 117c16-8 30-12 46-13" />
        </g>
        <path d="M86 169 66 186" />
        <path d="M102 173 79 195" />
        <path d="M170 169 190 186" />
        <path d="M154 173 177 195" />
        <path d="M118 178 116 182" />
        <path d="M138 178 140 182" />
      </g>
      <g stroke="#f4f9ff" stroke-width="6.4">
        <circle cx="113" cy="124" r="10" />
        <circle cx="143" cy="124" r="10" />
      </g>
    </g>
  </g>
</svg>
